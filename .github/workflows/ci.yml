name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify icons
        run: npm run icons

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Package macOS app
        run: npm run package:mac
